<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrapheneOS UI</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="phone">

    <!-- Lock Screen -->
    <div id="lockScreen" class="screen active">

        <h2>🔒 Phone Locked</h2>

        <input type="password"
        id="password"
        placeholder="Enter Password">

        <button onclick="unlockPhone()">
            Unlock
        </button>

        <div class="fingerprint">
            <button onclick="fingerprintLogin()">
                👆 Fingerprint Unlock
            </button>
        </div>

        <button onclick="faceUnlock()">
            📷 Face Unlock
        </button>

    </div>


    <!-- Home Screen -->
    <div id="homeScreen" class="screen">

        <h2>🏠 Home Screen</h2>

        <!-- Battery -->

        <div class="battery">

            🔋 <span id="battery">100</span>%

        </div>

        <!-- Theme -->

        <button onclick="toggleTheme()">

            🌙 Theme

        </button>


        <!-- Notifications -->

        <div id="notifications">

            <h3>Notifications</h3>

            <p>WiFi Connected</p>

            <p>New Security Update</p>

        </div>


        <!-- Apps -->

        <div class="apps">

            <button>📞</button>

            <button>📧</button>

            <button>🌐</button>

            <button>⚙️</button>

            <button>🔒</button>

            <button>📷</button>

        </div>


        <!-- Change Password -->

        <h3>Change Password</h3>

        <input type="password"
        id="newPassword"
        placeholder="New Password">

        <button onclick="changePassword()">

            Save

        </button>


        <!-- WiFi -->

        <h3>WiFi</h3>

        <select>

            <option>Home WiFi</option>

            <option>Office WiFi</option>

            <option>Guest WiFi</option>

        </select>


        <!-- Theme Settings -->

        <h3>Theme Settings</h3>

        <select onchange="changeTheme(this.value)">

            <option>Dark</option>

            <option>Light</option>

        </select>


        <!-- Privacy Dashboard -->

        <h3>Privacy Dashboard</h3>

        <p>Camera Access : 2 apps</p>

        <p>Microphone : 1 app</p>

        <p>Location : 3 apps</p>


        <!-- App Permissions -->

        <h3>App Permissions</h3>

        <p>Camera : Allowed</p>

        <p>Microphone : Denied</p>

        <p>Location : Allowed</p>


        <!-- Secure Folder -->

        <button onclick="openSecureFolder()">

            📁 Secure Folder

        </button>


        <!-- Emergency SOS -->

        <button onclick="emergencySOS()">

            🚨 SOS

        </button>


    </div>

</div>

<script src="script.js"></script>

</body>
</html>
