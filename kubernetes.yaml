apiVersion: apps/v1
kind: Deployment

metadata:
  name: secure-mobile-os

spec:
  replicas: 2

  selector:
    matchLabels:
      app: secure-mobile-os

  template:
    metadata:
      labels:
        app: secure-mobile-os

    spec:

      containers:

      - name: secure-mobile-os

        image: secure-mobile-os:latest

        ports:

        - containerPort: 3000